<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Music App</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Favicon -->
  <link rel="icon" href="data:,">
</head>

<body>

  <div class="app">

    <!-- ================================================= -->
    <!-- ================= HOME SCREEN =================== -->
    <!-- ================================================= -->

    <div class="screen home-screen" id="homeScreen">

      <!-- Logo -->
      <h2 class="title">🎧 Music App</h2>

      <!-- Search -->
      <div class="search-box">

        <input type="text" id="searchInput" placeholder="Search songs...">

        <button onclick="searchSongs()">
          🔍
        </button>

      </div>

      <!-- Categories -->
      <div class="categories">

        <span class="active">All</span>

        <span>Party</span>

        <span>Blues</span>

        <span>Sad</span>

      </div>

      <!-- Heading -->
      <h3 class="section-title">
        Search Results
      </h3>

      <!-- Results -->
      <div id="results"></div>

    </div>



    <!-- ================================================= -->
    <!-- ================= PLAYER SCREEN ================= -->
    <!-- ================================================= -->

    <div class="screen player-screen hidden" id="playerScreen">


      <!-- ================= TOP BAR ================= -->

      <div class="top-bar">

        <!-- Back -->
        <button onclick="closePlayer()">
          < </button>

            <!-- Album Info -->
            <div class="album-info">

              <p>
                PLAYING FROM ALBUM
              </p>

              <h3 id="topSongTitle">
                No Song
              </h3>

            </div>

            <!-- More -->
            <button>
              ⋮
            </button>

      </div>



      <!-- ================= BIG ALBUM ================= -->

      <img id="albumImage" class="album" src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4" alt="Album">



      <!-- ================= SONG INFO ================= -->

      <div class="song-info">

        <div class="song-left">

          <!-- Mini Album -->
          <img id="miniAlbum" src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4" alt="Mini Album">

          <!-- Song Text -->
          <div class="song-text">

            <!-- Sliding Title -->
            <div class="song-title-wrapper">

              <div id="songTitle" class="song-title">
                No song selected
              </div>

            </div>

            <!-- Artist -->
            <p class="song-artist" id="artistName">
              Unknown Artist
            </p>

          </div>

        </div>

        <!-- Add -->
        <button class="add-btn">
          +
        </button>

      </div>



      <!-- ================= PROGRESS ================= -->

      <div class="progress-container">

        <!-- Progress -->
        <div class="progress-bar" onclick="seek(event)">

          <div id="progress"></div>

        </div>

        <!-- Time -->
        <div class="time-row">

          <span id="currentTime">
            0:00
          </span>

          <span id="duration">
            0:00
          </span>

        </div>

      </div>



      <!-- ================= CONTROLS ================= -->

      <div class="controls">

        <!-- Previous -->
        <button class="side-btn" onclick="prevSong()">
          ⏮
        </button>

        <!-- Play -->
        <button class="play-btn" id="playBtn" onclick="togglePlay()">
          ▶
        </button>

        <!-- Next -->
        <button class="side-btn" onclick="nextSong()">
          ⏭
        </button>

      </div>



      <!-- ================= EXTRA OPTIONS ================= -->

      <div class="extra-options">

        <button>
          🔀
        </button>

        <button>
          🔗
        </button>

        <button>
          ☰
        </button>

      </div>



      <!-- ================= VOLUME ================= -->

      <div class="volume-container">

        <input type="range" min="0" max="100" value="100" onchange="setVolume(this.value)">

      </div>
      <!-- ================= SUGGESTIONS ================= -->

      <div class="suggestions-section">

        <h3>Suggested Songs</h3>

        <div id="suggestions"></div>

      </div>

    </div>

  </div>




  <!-- ================= MINI PLAYER =================== -->

  <div class="mini-player" onclick="openPlayer()">

    <!-- Image -->
    <img id="miniImg" src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4" alt="Mini Album">

    <!-- Song Info -->
    <div class="mini-info">

      <p id="miniTitle">
        No song
      </p>

    </div>

    <!-- Play -->
    <button class="mini-play-btn" id="miniPlayBtn" onclick="togglePlay(event)">
      ▶
    </button>

  </div>




  <!-- ================= YOUTUBE PLAYER ================ -->


  <div id="player"></div>




  <!-- ================= SCRIPTS ======================= -->


  <script src="https://www.youtube.com/iframe_api"></script>

  <script src="script.js"></script>

</body>

</html>
